<!DOCTYPE html>
<html lang="en" ng-app="gitMatchApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your personalised GitHub issue feed, matched to your tech stack.">
    <title>My Matches | GitMatch</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="config.js"></script>
    <script src="toast.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>

    <style>
        :root {
            --royal-blue: #1a3a8a;
            --royal-blue-hover: #1e40af;
            --text-main: #ffffff;
            --text-dim: rgba(255,255,255,0.5);
            --glass-border: rgba(255,255,255,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body {
            background-color: #000212;
            background-image: radial-gradient(circle at 50% 0%, rgba(26,58,138,0.15) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
        }

        .navbar-wrapper {
            width: 100%;
            padding-top: 20px;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            padding-bottom: 4px;
        }
        .navbar-pill {
            width: 90%;
            max-width: 1200px;
            height: 58px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 100px;
            padding: 0 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }
        .brand { font-size: 18px; font-weight: 800; color: white; text-decoration: none; letter-spacing: -0.5px; }
        .nav-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 28px;
        }
        .nav-center a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s;
        }
        .nav-center a:hover,
        .nav-center a.active { color: white; }

        .btn-logout {
            background: rgba(255,255,255,0.05);
            color: white;
            padding: 9px 22px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.1); }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }
        .hamburger span {
            width: 20px;
            height: 2px;
            background: white;
            border-radius: 2px;
            transition: 0.3s;
        }
        .hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .mobile-drop {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-16px);
            width: 92%;
            max-width: 1200px;
            background: rgba(10,12,20,0.97);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 5;
            margin-top: 8px;
        }
        .mobile-drop.open {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        .mobile-drop a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .mobile-drop a:hover { background: rgba(255,255,255,0.05); color: white; }
        .mobile-drop .mob-logout {
            margin-top: 4px;
            padding: 12px;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            color: #fca5a5;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: background 0.2s;
        }
        .mobile-drop .mob-logout:hover { background: rgba(239,68,68,0.15); }

        .dashboard-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 32px;
            padding: 40px 5% 60px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .sidebar {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 28px;
            height: fit-content;
            position: sticky;
            top: 90px;
        }
        .section-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 14px;
            display: block;
        }
        .stack-chip {
            padding: 9px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
        }
        .level-badge {
            padding: 10px 14px;
            background: var(--royal-blue);
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }
        .sidebar-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 20px 0; }
        .sidebar-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }
        .sidebar-stat strong { color: white; font-weight: 700; }

        .edit-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.07);
            text-align: center;
            color: var(--text-dim);
            font-size: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
        }
        .edit-link:hover {
            color: white;
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.03);
        }

        .saved-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.07);
            color: var(--text-dim);
            font-size: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
        }
        .saved-link:hover {
            color: white;
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.03);
        }
        .saved-badge {
            background: rgba(251,191,36,0.15);
            color: #fbbf24;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
            padding: 2px 7px;
        }

        .feed-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .feed-title h2 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
        .feed-title p { color: var(--text-dim); margin-top: 5px; font-size: 14px; }
        .feed-actions { display: flex; gap: 10px; align-items: center; }
        .issue-count { font-size: 13px; color: var(--text-dim); font-weight: 600; }

        .filters-row {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
            overflow-x: auto;
            padding-bottom: 6px;
            scrollbar-width: none;
        }
        .filters-row::-webkit-scrollbar { display: none; }

        .filter-pill {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 8px 18px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            font-family: inherit;
        }
        .filter-pill:hover { background: rgba(255,255,255,0.1); color: white; }
        .filter-pill.active { background: var(--royal-blue); color: white; border-color: var(--royal-blue); }

        .btn-refresh {
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 9px 16px;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-refresh:hover { background: rgba(255,255,255,0.1); }
        .btn-refresh:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-refresh.spinning .fa-sync { animation: spin360 0.6s linear; }
        @keyframes spin360 { to { transform: rotate(360deg); } }

        .issue-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 18px;
        }
        .issue-card {
            background: rgba(8,8,10,0.85);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 16px;
            transition: transform 0.25s, border-color 0.25s;
        }
        .issue-card:hover { transform: translateY(-5px); border-color: var(--royal-blue); }
        .card-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .repo-label {
            font-size: 11px;
            font-weight: 800;
            color: #60a5fa;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 65%;
        }
        .difficulty-tag {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }
        .difficulty-tag.beginner { background: rgba(16,185,129,0.12); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); }
        .difficulty-tag.intermediate { background: rgba(245,158,11,0.12); color: #fcd34d; border: 1px solid rgba(245,158,11,0.2); }
        .difficulty-tag.expert { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
        .issue-title { font-size: 15px; line-height: 1.5; font-weight: 700; color: white; }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 14px;
            border-top: 1px solid var(--glass-border);
            gap: 8px;
        }
        .issue-date { font-size: 12px; color: var(--text-dim); font-weight: 600; white-space: nowrap; }
        .btn-row { display: flex; gap: 8px; align-items: center; }

        .save-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .save-btn:hover { border-color: #fbbf24; color: #fbbf24; }
        .save-btn.saved { border-color: #fbbf24; color: #fbbf24; background: rgba(251,191,36,0.08); }
        .save-btn.saving { opacity: 0.5; cursor: not-allowed; }

        .view-btn {
            background: var(--royal-blue);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 12px;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .view-btn:hover { background: var(--royal-blue-hover); }

        .load-more-wrap { display: none; justify-content: center; margin-top: 32px; margin-bottom: 20px; }
        .load-more-wrap.visible { display: flex; }
        .btn-load-more {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 36px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-load-more:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.25); }
        .btn-load-more:disabled { opacity: 0.4; cursor: not-allowed; }

        .state-box {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-dim);
        }
        .state-box .icon { font-size: 2rem; margin-bottom: 16px; }
        .state-box p { font-weight: 600; font-size: 15px; }
        .state-box .sub { font-size: 13px; margin-top: 8px; opacity: 0.6; }
        .state-box a { color: #60a5fa; text-decoration: none; font-weight: 700; }

        @media (max-width: 900px) {
            .nav-center { display: none; }
            .hamburger { display: flex; }
            .btn-logout { display: none; }
            .dashboard-container { grid-template-columns: 1fr; padding: 24px 5% 40px; }
            .sidebar { position: static; }
        }
        @media (max-width: 500px) {
            .feed-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body ng-controller="DashboardCtrl">
    <nav class="navbar-wrapper" aria-label="Main navigation">
        <div class="navbar-pill">
            <a href="index.html" class="brand">GitMatch</a>
            <div class="nav-center">
                <a href="find-issues.html" class="active">My Matches</a>
                <a href="explore.html">Trending</a>
                <a href="saveissue.html">Saved</a>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
                <button id="logout-btn" class="btn-logout">Logout</button>
                <button class="hamburger" id="hamburger" aria-label="Open navigation menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
        <div class="mobile-drop" id="mobile-menu">
            <a href="find-issues.html">My Matches</a>
            <a href="explore.html">Trending</a>
            <a href="saveissue.html">Saved Issues</a>
            <a href="onboarding.html">Edit Preferences</a>
            <button class="mob-logout" id="mob-logout-btn">Sign Out</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <aside class="sidebar" aria-label="Your profile summary">
            <span class="section-label">Your Stack</span>

            <div class="stack-chip" ng-repeat="lang in sidebar.languages track by $index">
                {{ lang }}
            </div>
            <div ng-if="sidebar.languages.length === 0" style="color:var(--text-dim);font-size:13px;margin-bottom:8px;">
                Loading...
            </div>

            <span class="section-label" style="margin-top:22px;">Match Level</span>
            <div class="level-badge" ng-bind="sidebar.levelLabel" ng-style="sidebar.levelStyle"></div>

            <div class="sidebar-divider"></div>

            <div class="sidebar-stat">
                <span>Issues loaded</span>
                <strong ng-bind="sidebar.issueCount"></strong>
            </div>
            <div class="sidebar-stat">
                <span>Languages</span>
                <strong ng-bind="sidebar.languages.length || '-'"></strong>
            </div>

            <a href="onboarding.html" class="edit-link">
                <i class="fas fa-sliders-h" aria-hidden="true"></i>
                Edit Preferences
            </a>
            <a href="saveissue.html" class="saved-link">
                <span><i class="fas fa-bookmark" style="margin-right:6px;"></i>Saved Issues</span>
                <span class="saved-badge" ng-bind="sidebar.savedCount">0</span>
            </a>
        </aside>

        <main>
            <div class="feed-header">
                <div class="feed-title">
                    <h2>Your Matches</h2>
                    <p>Open issues matched to your stack, live from GitHub.</p>
                </div>
                <div class="feed-actions">
                    <span class="issue-count" id="issue-count" aria-live="polite"></span>
                    <button class="btn-refresh" id="refreshBtn" aria-label="Refresh issues">
                        <i class="fas fa-sync" aria-hidden="true"></i> Refresh
                    </button>
                </div>
            </div>

            <div class="filters-row" role="group" aria-label="Filter by language">
                <button
                    class="filter-pill"
                    ng-repeat="lang in filters.langs track by $index"
                    ng-class="{ active: filters.active === lang }"
                    ng-click="setFilter(lang)">
                    {{ lang }}
                </button>
            </div>

            <div id="issuesContainer" class="issue-grid" aria-live="polite" aria-label="Issue feed">
                <div class="state-box">
                    <div class="icon"><i class="fas fa-circle-notch fa-spin" aria-hidden="true"></i></div>
                    <p>Loading your matches...</p>
                </div>
            </div>

            <div class="load-more-wrap" id="loadMoreWrap">
                <button class="btn-load-more" id="loadMoreBtn">Load More Issues</button>
            </div>
        </main>
    </div>

    <script>
        const app = angular.module('gitMatchApp', []);

        app.controller('DashboardCtrl', ['$scope', function ($scope) {
            $scope.sidebar = {
                languages: [],
                levelLabel: '-',
                levelStyle: {},
                issueCount: '-',
                savedCount: 0
            };

            $scope.filters = {
                langs: ['All'],
                active: 'All'
            };

            $scope.setFilter = function (lang) {
                if ($scope.filters.active === lang || window._isLoading) return;
                $scope.filters.active = lang;
                window._activeLangFilter = lang;
                window._currentPage = 1;
                window._fetchIssues(true);
            };

            window._ngSetPrefs = function (prefs) {
                $scope.$apply(function () {
                    $scope.sidebar.languages = prefs.languages || [];
                    $scope.filters.langs = ['All', ...(prefs.languages || [])];

                    const levelMap = {
                        'good first issue': { label: 'GOOD FIRST ISSUE', style: { background: '#065f46' } },
                        'help wanted': { label: 'HELP WANTED', style: { background: '#92400e' } },
                        enhancement: { label: 'ENHANCEMENT', style: { background: '#581c87' } }
                    };

                    const lv = levelMap[prefs.level] || {
                        label: (prefs.level || '-').toUpperCase(),
                        style: {}
                    };

                    $scope.sidebar.levelLabel = lv.label;
                    $scope.sidebar.levelStyle = lv.style;
                });
            };

            window._ngSetIssueCount = function (n) {
                $scope.$apply(function () {
                    $scope.sidebar.issueCount = n;
                });
            };

            window._ngSetSavedCount = function (n) {
                $scope.$apply(function () {
                    $scope.sidebar.savedCount = n;
                });
            };

            window._ngSetActiveFilter = function (lang) {
                $scope.$apply(function () {
                    $scope.filters.active = lang;
                });
            };
        }]);

        let currentUserId = null;
        let userPrefs = null;
        let savedIssueIds = new Set();
        let currentPage = 1;
        let isLoading = false;
        let allLoaded = false;
        const PAGE_SIZE = 30;

        window._isLoading = false;
        window._activeLangFilter = 'All';
        window._currentPage = 1;

        async function handleLogout() {
            await supabase.auth.signOut();
            localStorage.removeItem('userPrefs');
            window.location.replace('login.html');
        }

        document.getElementById('logout-btn').addEventListener('click', handleLogout);
        document.getElementById('mob-logout-btn').addEventListener('click', handleLogout);

        (function () {
            const ham = document.getElementById('hamburger');
            const menu = document.getElementById('mobile-menu');

            ham.addEventListener('click', (e) => {
                e.stopPropagation();
                ham.classList.toggle('active');
                menu.classList.toggle('open');
            });

            document.addEventListener('click', (e) => {
                if (!ham.contains(e.target) && !menu.contains(e.target)) {
                    ham.classList.remove('active');
                    menu.classList.remove('open');
                }
            });

            menu.querySelectorAll('a').forEach((a) => {
                a.addEventListener('click', () => {
                    ham.classList.remove('active');
                    menu.classList.remove('open');
                });
            });
        })();

        document.getElementById('refreshBtn').addEventListener('click', () => {
            if (!userPrefs || isLoading) return;
            toast('Refreshing...', 'info', 1500);
            loadFeed();
        });

        document.getElementById('loadMoreBtn').addEventListener('click', () => {
            if (!isLoading && !allLoaded && userPrefs) {
                currentPage++;
                window._currentPage = currentPage;
                window._fetchIssues(false);
            }
        });

        async function loadPrefs(session) {
            const raw = localStorage.getItem('userPrefs');
            if (raw) {
                try {
                    const p = JSON.parse(raw);
                    if (Array.isArray(p.languages) && p.languages.length > 0) return p;
                } catch (_) {}
            }

            try {
                const r = await fetch(`${API_BASE}/api/get-profile`, {
                    headers: { Authorization: `Bearer ${session.access_token}` }
                });

                if (r.ok) {
                    const profile = await r.json();
                    if (profile.languages && profile.languages.length > 0) {
                        const prefs = { languages: profile.languages, level: profile.level };
                        localStorage.setItem('userPrefs', JSON.stringify(prefs));
                        return prefs;
                    }
                }
            } catch (_) {}

            return null;
        }

        async function loadSavedIds() {
            try {
                const { data, error } = await supabase
                    .from('Saved_Issues')
                    .select('github_issue_id')
                    .eq('user_id', currentUserId);

                if (error) throw error;

                savedIssueIds = new Set((data || []).map((r) => String(r.github_issue_id)));
                if (window._ngSetSavedCount) window._ngSetSavedCount(savedIssueIds.size);
            } catch (err) {
                console.warn('Could not load saved IDs:', err.message);
            }
        }

        function updateSavedBadge() {
            if (window._ngSetSavedCount) window._ngSetSavedCount(savedIssueIds.size);
        }

        function showState(iconHtml, message, sub = '') {
            document.getElementById('issuesContainer').innerHTML = `
                <div class="state-box">
                    <div class="icon">${iconHtml}</div>
                    <p>${message}</p>
                    ${sub ? `<p class="sub">${sub}</p>` : ''}
                </div>`;
            document.getElementById('issue-count').textContent = '';
            if (window._ngSetIssueCount) window._ngSetIssueCount('-');
            document.getElementById('loadMoreWrap').classList.remove('visible');
        }

        function difficultyInfo(level) {
            if (level.includes('help wanted') || level === 'intermediate') {
                return { label: 'Intermediate', cls: 'intermediate' };
            }
            if (level.includes('enhancement') || level === 'expert') {
                return { label: 'Expert', cls: 'expert' };
            }
            return { label: 'Beginner', cls: 'beginner' };
        }

        function buildCard(issue) {
            const isSaved = savedIssueIds.has(String(issue.id));
            const diff = difficultyInfo(userPrefs.level);
            const dateStr = issue.created_at
                ? new Date(issue.created_at).toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric'
                })
                : '';

            const card = document.createElement('article');
            card.className = 'issue-card';

            const top = document.createElement('div');
            const meta = document.createElement('div');
            meta.className = 'card-meta';

            const repoLabel = document.createElement('span');
            repoLabel.className = 'repo-label';
            repoLabel.textContent = issue.repo;
            repoLabel.title = issue.repo;

            const tag = document.createElement('span');
            tag.className = `difficulty-tag ${diff.cls}`;
            tag.textContent = diff.label;

            meta.appendChild(repoLabel);
            meta.appendChild(tag);

            const titleEl = document.createElement('h3');
            titleEl.className = 'issue-title';
            titleEl.textContent = issue.title;

            top.appendChild(meta);
            top.appendChild(titleEl);

            const footer = document.createElement('div');
            footer.className = 'card-footer';

            const dateEl = document.createElement('span');
            dateEl.className = 'issue-date';
            dateEl.textContent = dateStr;

            const btnRow = document.createElement('div');
            btnRow.className = 'btn-row';

            const saveBtn = document.createElement('button');
            saveBtn.className = `save-btn${isSaved ? ' saved' : ''}`;
            saveBtn.textContent = isSaved ? 'Saved' : 'Save';
            saveBtn.dataset.id = issue.id;
            saveBtn.dataset.title = issue.title;
            saveBtn.dataset.repo = issue.repo;
            saveBtn.dataset.url = issue.url;
            saveBtn.addEventListener('click', () => toggleSave(saveBtn));

            const viewBtn = document.createElement('a');
            viewBtn.href = issue.url;
            viewBtn.target = '_blank';
            viewBtn.rel = 'noopener noreferrer';
            viewBtn.className = 'view-btn';
            viewBtn.textContent = 'View Issue';

            btnRow.appendChild(saveBtn);
            btnRow.appendChild(viewBtn);
            footer.appendChild(dateEl);
            footer.appendChild(btnRow);

            card.appendChild(top);
            card.appendChild(footer);
            return card;
        }

        async function toggleSave(btn) {
            if (btn.classList.contains('saving')) return;

            const issueId = String(btn.dataset.id);
            const isSaved = savedIssueIds.has(issueId);

            btn.classList.add('saving');
            btn.textContent = '...';

            try {
                if (isSaved) {
                    const { error } = await supabase
                        .from('Saved_Issues')
                        .delete()
                        .eq('user_id', currentUserId)
                        .eq('github_issue_id', issueId);

                    if (error) throw error;

                    savedIssueIds.delete(issueId);
                    btn.textContent = 'Save';
                    btn.classList.remove('saved');
                    toast('Issue removed from saved.', 'info', 2000);
                } else {
                    const { error } = await supabase
                        .from('Saved_Issues')
                        .insert({
                            user_id: currentUserId,
                            github_issue_id: issueId,
                            title: btn.dataset.title,
                            repo_name: btn.dataset.repo,
                            url: btn.dataset.url,
                            difficulty_label: userPrefs.level
                        });

                    if (error) throw error;

                    savedIssueIds.add(issueId);
                    btn.textContent = 'Saved';
                    btn.classList.add('saved');
                    toast('Issue saved!', 'success', 2000);
                }

                updateSavedBadge();
            } catch (err) {
                console.error('[toggleSave]', err.message);
                btn.textContent = isSaved ? 'Saved' : 'Save';
                if (isSaved) btn.classList.add('saved');
                else btn.classList.remove('saved');
                toast('Could not save - try again.', 'error');
            } finally {
                btn.classList.remove('saving');
            }
        }

        window._fetchIssues = async function fetchIssues(reset = false) {
            if (isLoading) return;

            isLoading = true;
            window._isLoading = true;

            const activeLangFilter = window._activeLangFilter || 'All';
            currentPage = window._currentPage || 1;

            const refreshBtn = document.getElementById('refreshBtn');
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            const container = document.getElementById('issuesContainer');

            if (reset) {
                allLoaded = false;
                currentPage = 1;
                window._currentPage = 1;
                showState('<i class="fas fa-circle-notch fa-spin"></i>', 'Loading your matches...');
                refreshBtn.disabled = true;
                refreshBtn.classList.add('spinning');
            } else {
                loadMoreBtn.disabled = true;
                loadMoreBtn.textContent = 'Loading...';
            }

            try {
                const res = await fetch(`${API_BASE}/api/issues`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        languages: userPrefs.languages,
                        level: userPrefs.level,
                        page: currentPage,
                        filterLang: activeLangFilter
                    })
                });

                const issues = await res.json();

                if (issues.error) {
                    if (res.status === 429) {
                        toast('GitHub rate limit hit - try again shortly.', 'error', 6000);
                    }
                    throw new Error(issues.error);
                }

                if (reset) container.innerHTML = '';

                if (issues.length === 0 && reset) {
                    showState(
                        '<i class="fas fa-search"></i>',
                        'No matching issues found right now.',
                        'Try <a href="onboarding.html">editing your stack</a> or changing your experience level.'
                    );
                    return;
                }

                const frag = document.createDocumentFragment();
                issues.forEach((issue) => frag.appendChild(buildCard(issue)));
                container.appendChild(frag);

                const total = container.querySelectorAll('article.issue-card').length;
                document.getElementById('issue-count').textContent = `${total} issue${total !== 1 ? 's' : ''}`;
                if (window._ngSetIssueCount) window._ngSetIssueCount(total);

                if (issues.length >= PAGE_SIZE) {
                    document.getElementById('loadMoreWrap').classList.add('visible');
                } else {
                    allLoaded = true;
                    document.getElementById('loadMoreWrap').classList.remove('visible');
                    if (!reset) toast('All issues loaded.', 'info', 2000);
                }
            } catch (err) {
                console.error('[fetchIssues]', err);
                if (reset) {
                    showState(
                        '<i class="fas fa-plug" style="color:#ef4444"></i>',
                        'Could not reach the backend.',
                        'Make sure the server is running: npm start'
                    );
                }
                toast('Error loading issues.', 'error');
            } finally {
                isLoading = false;
                window._isLoading = false;
                refreshBtn.disabled = false;
                refreshBtn.classList.remove('spinning');
                loadMoreBtn.disabled = false;
                loadMoreBtn.textContent = 'Load More Issues';
            }
        };

        function loadFeed() {
            window._activeLangFilter = 'All';
            window._currentPage = 1;
            if (window._ngSetActiveFilter) window._ngSetActiveFilter('All');
            window._fetchIssues(true);
        }

        window.addEventListener('load', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) return window.location.replace('login.html');

            currentUserId = session.user.id;

            const prefs = await loadPrefs(session);
            if (!prefs) {
                toast('Please set up your preferences first.', 'info');
                setTimeout(() => window.location.replace('onboarding.html'), 1500);
                return;
            }

            userPrefs = prefs;

            if (window._ngSetPrefs) window._ngSetPrefs(prefs);

            await loadSavedIds();
            await window._fetchIssues(true);
        });
    </script>
</body>
</html>
